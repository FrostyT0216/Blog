{{ define "main" }}
{{ $page := . }}
<div class="article-container">
    <div class="article-header" style="margin-bottom: 2rem;">
        <h1 class="article-title">{{ $page.Title }}</h1>
    </div>

    <div class="qrcode-layout">
        <!-- 左侧：参数面板 -->
        <div class="qrcode-panel">
            <div class="qrcode-form">
                <div class="form-group">
                    <label for="qrcode-text">文本内容 *</label>
                    <textarea id="qrcode-text" rows="3" placeholder="输入网址、文字、联系方式…">https://www.bilibili.com/video/BV1uT4y1P7CX/</textarea>
                </div>

                <div class="form-group">
                    <label for="qrcode-size">尺寸 (px)</label>
                    <input type="number" id="qrcode-size" value="256" min="100" max="1024" step="1" />
                    <span class="form-hint">100 ~ 1024</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="qrcode-fgcolor">前景色</label>
                        <input type="color" id="qrcode-fgcolor" value="#000000" />
                    </div>
                    <div class="form-group">
                        <label for="qrcode-bgcolor">背景色</label>
                        <input type="color" id="qrcode-bgcolor" value="#ffffff" />
                    </div>
                </div>

                <div class="form-group form-checkbox">
                    <label>
                        <input type="checkbox" id="qrcode-transparent" />
                        透明背景（勾选后背景色设置无效）
                    </label>
                </div>

                <button id="qrcode-generate" class="btn btn-primary">生成二维码</button>
            </div>
        </div>

        <!-- 右侧：预览区 -->
        <div class="qrcode-preview">
            <div class="preview-card" id="qrcode-result">
                <div class="preview-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <rect x="4" y="4" width="6" height="6" rx="1"/>
                        <rect x="14" y="4" width="6" height="6" rx="1"/>
                        <rect x="4" y="14" width="6" height="6" rx="1"/>
                        <path d="M14 17l1 1l3 -3"/>
                        <rect x="17" y="14" width="3" height="3" rx="1"/>
                    </svg>
                    <p>配置参数后点击生成</p>
                </div>
            </div>
            <div class="preview-actions" id="qrcode-actions" style="display:none;">
                <a id="qrcode-download" class="btn btn-secondary" download="qrcode.png">下载图片</a>
                <button id="qrcode-copy" class="btn btn-secondary">复制到剪贴板</button>
            </div>
        </div>
    </div>

    <div class="qrcode-info">
        <p>纯浏览器端生成，无需服务器，数据不会上传</p>
    </div>
</div>

<style>
.qrcode-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin: 1.5rem 0;
}

@media (max-width: 768px) {
    .qrcode-layout {
        grid-template-columns: 1fr;
    }
}

/* 左侧参数面板 */
.qrcode-panel {
    background: var(--card-background, #fff);
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.qrcode-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.form-group label {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--body-text-color);
}

.form-group textarea,
.form-group input[type="number"],
.form-group select {
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--card-border-color, #e0e0e0);
    border-radius: 8px;
    font-size: 0.95rem;
    background: var(--card-background, #fff);
    color: var(--body-text-color);
    transition: border-color 0.2s;
}

.form-group textarea:focus,
.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #7cab86;
    box-shadow: 0 0 0 2px rgba(124, 171, 134, 0.2);
}

.form-group input[type="color"] {
    width: 100%;
    height: 40px;
    padding: 2px;
    border-radius: 8px;
    cursor: pointer;
}

.form-hint {
    font-size: 0.8rem;
    opacity: 0.6;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
}

.form-checkbox label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    font-weight: 400;
}

.form-checkbox input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #7cab86;
}

/* 生成按钮 */
#qrcode-generate {
    padding: 0.7rem 1.5rem;
    background: linear-gradient(135deg, #7cab86, #5a9c6a);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 0.5rem;
}

#qrcode-generate:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(124, 171, 134, 0.4);
}

#qrcode-generate:active {
    transform: translateY(0);
}

/* 右侧预览区 */
.qrcode-preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
}

.preview-card {
    width: 100%;
    max-width: 320px;
    aspect-ratio: 1 / 1;
    background: var(--card-background, #fff);
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

.preview-card img {
    max-width: 100%;
    max-height: 100%;
    display: block;
}

.preview-card .preview-placeholder {
    text-align: center;
    opacity: 0.4;
}

.preview-card .preview-placeholder svg {
    margin-bottom: 0.5rem;
}

.preview-card .preview-placeholder p {
    margin: 0;
    font-size: 0.9rem;
}

/* 操作按钮 */
.btn {
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    text-decoration: none;
    display: inline-block;
    transition: opacity 0.2s;
}

.btn-secondary {
    background: var(--card-background-selected, rgba(0,0,0,0.05));
    color: var(--body-text-color);
    border: 1px solid var(--card-border-color, #e0e0e0);
}

.btn-secondary:hover {
    opacity: 0.8;
}

.preview-actions {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    justify-content: center;
}

/* 底部信息 */
.qrcode-info {
    text-align: center;
    opacity: 0.5;
    font-size: 0.8rem;
    margin-top: 1.5rem;
}

.qrcode-info a {
    color: var(--body-text-color);
    text-decoration: underline;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const textInput = document.getElementById('qrcode-text');
    const sizeInput = document.getElementById('qrcode-size');
    const fgcolorInput = document.getElementById('qrcode-fgcolor');
    const bgcolorInput = document.getElementById('qrcode-bgcolor');
    const transparentCheck = document.getElementById('qrcode-transparent');
    const generateBtn = document.getElementById('qrcode-generate');
    const resultDiv = document.getElementById('qrcode-result');
    const actionsDiv = document.getElementById('qrcode-actions');
    const downloadLink = document.getElementById('qrcode-download');
    const copyBtn = document.getElementById('qrcode-copy');

    let currentQR = null;

    // 透明背景时禁用背景色选择
    transparentCheck.addEventListener('change', function() {
        bgcolorInput.disabled = this.checked;
        bgcolorInput.style.opacity = this.checked ? '0.4' : '1';
    });

    function generateQR() {
        const text = textInput.value.trim();
        if (!text) {
            alert('请输入要编码的文本内容');
            textInput.focus();
            return;
        }

        const size = parseInt(sizeInput.value) || 256;
        const fgColor = fgcolorInput.value;
        const bgColor = transparentCheck.checked ? 'rgba(0,0,0,0)' : bgcolorInput.value;

        // 清空并生成新的二维码（纯 canvas 绘制）
        resultDiv.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        resultDiv.appendChild(canvas);

        currentQR = new QRCode(canvas, {
            text: text,
            width: size,
            height: size,
            colorDark: fgColor,
            colorLight: bgColor,
            correctLevel: QRCode.CorrectLevel.H
        });

        actionsDiv.style.display = 'flex';

        // 更新下载链接
        setTimeout(() => {
            const imgData = canvas.toDataURL('image/png');
            downloadLink.href = imgData;
        }, 100);
    }

    generateBtn.addEventListener('click', generateQR);

    // 回车键快速生成
    textInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            generateQR();
        }
    });

    // 复制到剪贴板
    copyBtn.addEventListener('click', function() {
        const canvas = resultDiv.querySelector('canvas');
        if (!canvas) return;

        canvas.toBlob(function(blob) {
            navigator.clipboard.write([
                new ClipboardItem({ 'image/png': blob })
            ]).then(() => {
                const orig = copyBtn.textContent;
                copyBtn.textContent = '已复制 ✓';
                setTimeout(() => copyBtn.textContent = orig, 2000);
            }).catch(() => {
                // 降级：复制图片地址
                navigator.clipboard.writeText(downloadLink.href).then(() => {
                    alert('图片地址已复制到剪贴板');
                });
            });
        });
    });

    // 自动生成默认文本的二维码
    setTimeout(generateQR, 300);
});
</script>
{{ end }}
