{{ define "main" }}
{{ $page := . }}
<div class="article-container">
    <div class="article-header" style="margin-bottom: 2rem;">
        <h1 class="article-title">{{ $page.Title }}</h1>
    </div>

    <div class="qrcode-layout">
        <div class="qrcode-panel">
            <div class="qrcode-form">
                <div class="form-group">
                    <label for="qrcode-text">文本内容 *</label>
                    <textarea id="qrcode-text" rows="3" placeholder="输入网址、文字、联系方式…">https://www.bilibili.com/video/BV1uT4y1P7CX/</textarea>
                </div>

                <div class="form-group">
                    <label for="qrcode-size">尺寸 (px)</label>
                    <input type="number" id="qrcode-size" value="400" min="100" max="1024" step="1" />
                    <span class="form-hint">100 ~ 1024</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="qrcode-fgcolor">前景色</label>
                        <input type="color" id="qrcode-fgcolor" value="#000000" />
                    </div>
                    <div class="form-group">
                        <label for="qrcode-bgcolor">背景色</label>
                        <input type="color" id="qrcode-bgcolor" value="#ffffff" />
                    </div>
                </div>

                <div class="form-group form-checkbox">
                    <label>
                        <input type="checkbox" id="qrcode-transparent" />
                        透明背景（勾选后背景色设置无效）
                    </label>
                </div>

                <button id="qrcode-generate" class="btn btn-primary">生成二维码</button>
            </div>
        </div>

        <div class="qrcode-preview">
            <div class="preview-card" id="qrcode-result">
                <div class="preview-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <rect x="4" y="4" width="6" height="6" rx="1"/>
                        <rect x="14" y="4" width="6" height="6" rx="1"/>
                        <rect x="4" y="14" width="6" height="6" rx="1"/>
                        <path d="M14 17l1 1l3 -3"/>
                        <rect x="17" y="14" width="3" height="3" rx="1"/>
                    </svg>
                    <p>配置参数后点击生成</p>
                </div>
            </div>
            <div class="preview-actions" id="qrcode-actions" style="display:none;">
                <a id="qrcode-download" class="btn btn-secondary" download="qrcode.png">下载图片</a>
                <button id="qrcode-copy" class="btn btn-secondary">复制到剪贴板</button>
            </div>
        </div>
    </div>

    <div class="qrcode-info">
        <p>纯浏览器端本地计算生成，无需服务器，数据不会上传</p>
    </div>
</div>

<style>
.qrcode-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    margin: 1.5rem 0;
}

.qrcode-panel {
    width: 100%;
    max-width: 600px;
    background: var(--card-background, #fff);
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.qrcode-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.form-group label {
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--body-text-color);
}

.form-group textarea,
.form-group input[type="number"],
.form-group select {
    padding: 0.9rem 1.1rem;
    border: 1px solid var(--card-border-color, #e0e0e0);
    border-radius: 8px;
    font-size: 1.25rem;
    background: var(--card-background, #fff);
    color: var(--body-text-color);
    transition: border-color 0.2s;
}

.form-group textarea:focus,
.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #7cab86;
    box-shadow: 0 0 0 2px rgba(124, 171, 134, 0.2);
}

.form-group input[type="color"] {
    width: 100%;
    height: 44px;
    padding: 2px;
    border-radius: 8px;
    cursor: pointer;
}

.form-hint {
    font-size: 1.1rem;
    opacity: 0.6;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
}

.form-checkbox label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    font-weight: 400;
    font-size: 1.2rem;
}

.form-checkbox input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #7cab86;
}

#qrcode-generate {
    padding: 1rem 2.5rem;
    background: linear-gradient(135deg, #7cab86, #5a9c6a);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1.35rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 0.5rem;
}

#qrcode-generate:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(124, 171, 134, 0.4);
}

#qrcode-generate:active {
    transform: translateY(0);
}

.qrcode-preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
}

.preview-card {
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1 / 1;
    background: var(--card-background, #fff);
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    position: relative;
}

.preview-card img {
    max-width: 100%;
    max-height: 100%;
    display: block;
    image-rendering: pixelated;
}

.preview-card .preview-placeholder {
    text-align: center;
    opacity: 0.4;
}

.preview-card .preview-placeholder svg {
    margin-bottom: 0.5rem;
}

.preview-card .preview-placeholder p {
    margin: 0;
    font-size: 1.25rem;
}

.btn {
    padding: 0.7rem 1.6rem;
    border-radius: 8px;
    font-size: 1.2rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    text-decoration: none;
    display: inline-block;
    transition: opacity 0.2s;
}

.btn-secondary {
    background: var(--card-background-selected, rgba(0,0,0,0.05));
    color: var(--body-text-color);
    border: 1px solid var(--card-border-color, #e0e0e0);
}

.btn-secondary:hover {
    opacity: 0.8;
}

.preview-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
}

.qrcode-info {
    text-align: center;
    opacity: 0.5;
    font-size: 1.15rem;
    margin-top: 1.5rem;
}

.qrcode-info a {
    color: var(--body-text-color);
    text-decoration: underline;
}
</style>

<script>
(function() {
    var EXP_TABLE = new Array(256);
    var LOG_TABLE = new Array(256);
    for (var i = 0; i < 8; i++) { EXP_TABLE[i] = 1 << i; }
    for (var i = 8; i < 256; i++) {
        EXP_TABLE[i] = EXP_TABLE[i - 4] ^ EXP_TABLE[i - 5] ^ EXP_TABLE[i - 6] ^ EXP_TABLE[i - 8];
    }
    for (var i = 0; i < 255; i++) { LOG_TABLE[EXP_TABLE[i]] = i; }

    function glog(n) {
        if (n < 1) throw new Error('glog(' + n + ')');
        return LOG_TABLE[n];
    }

    function gexp(n) {
        while (n < 0) n += 255;
        while (n >= 255) n -= 255;
        return EXP_TABLE[n];
    }

    function Polynomial(num, shift) {
        var offset = 0;
        while (offset < num.length && num[offset] === 0) offset++;
        this.num = new Array(num.length - offset + shift);
        for (var i = 0; i < num.length - offset; i++) this.num[i] = num[offset + i];
    }

    Polynomial.prototype.get = function(index) { return this.num[index]; };
    Polynomial.prototype.getLength = function() { return this.num.length; };

    Polynomial.prototype.multiply = function(e) {
        var num = new Array(this.getLength() + e.getLength() - 1);
        for (var i = 0; i < this.getLength(); i++) {
            for (var j = 0; j < e.getLength(); j++) {
                num[i + j] ^= gexp(glog(this.get(i)) + glog(e.get(j)));
            }
        }
        return new Polynomial(num, 0);
    };

    Polynomial.prototype.mod = function(e) {
        if (this.getLength() - e.getLength() < 0) return this;
        var ratio = glog(this.get(0)) - glog(e.get(0));
        var num = new Array(this.getLength());
        for (var i = 0; i < this.getLength(); i++) num[i] = this.get(i);
        for (var i = 0; i < e.getLength(); i++) {
            num[i] ^= gexp(glog(e.get(i)) + ratio);
        }
        return new Polynomial(num, 0).mod(e);
    };

    var RS_BLOCK_TABLE = [

        [4,50,22,4,51,23],[3,36,12,8,37,13],[2,116,92,2,117,93],[6,58,36,2,59,37],
        [4,46,20,6,47,21],[7,42,14,4,43,15],[4,133,107],[8,59,37,1,60,38],[8,44,20,4,45,21],
        [12,33,11,4,34,12],[3,145,115,1,146,116],[4,64,40,5,65,41],[11,36,16,5,37,17],
        [11,36,12,5,37,13],[5,109,87,1,110,88],[5,65,41,5,66,42],[5,54,24,7,55,25],
        [11,36,12,7,37,13],[5,122,98,1,123,99],[7,73,45,3,74,46],[15,43,19,2,44,20],

        [2,42,14,17,43,15],[5,150,120,1,151,121],[9,69,43,4,70,44],[17,50,22,1,51,23],

    var EC_TABLE_INDEX = [1, 0, 3, 2];

    function getRSBlocks(typeNumber, errorCorrectLevel) {
        var rsBlock = RS_BLOCK_TABLE[(typeNumber - 1) * 4 + EC_TABLE_INDEX[errorCorrectLevel]];
        if (!rsBlock) throw new Error('bad rs block');
        var length = rsBlock.length / 3;
        var list = [];
        for (var i = 0; i < length; i++) {
            var count = rsBlock[i * 3];
            var totalCount = rsBlock[i * 3 + 1];
            var dataCount = rsBlock[i * 3 + 2];
            for (var j = 0; j < count; j++) {
                list.push({ totalCount: totalCount, dataCount: dataCount });
            }
        }
        return list;
    }

    var QR_MODE = { MODE_NUMBER: 1 << 0, MODE_ALPHA_NUM: 1 << 1, MODE_8BIT_BYTE: 1 << 2, MODE_KANJI: 1 << 3 };

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    function createData(typeNumber, errorCorrectLevel, dataList) {
        var rsBlocks = getRSBlocks(typeNumber, errorCorrectLevel);
        var buffer = new BitBuffer();
        for (var i = 0; i < dataList.length; i++) {
            var data = dataList[i];
            buffer.put(data.mode, 4);
            buffer.put(data.getLength(), getLengthInBits(data.mode, typeNumber));
            data.write(buffer);
        }
        var totalDataCount = 0;
        for (var i = 0; i < rsBlocks.length; i++) totalDataCount += rsBlocks[i].dataCount;
        if (buffer.getLengthInBits() > totalDataCount * 8) {
            throw new Error('code length overflow. (' + buffer.getLengthInBits() + '>' + totalDataCount * 8 + ')');
        }
        if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) buffer.put(0, 4);
        while (buffer.getLengthInBits() % 8 !== 0) buffer.putBit(false);
        while (true) {
            if (buffer.getLengthInBits() >= totalDataCount * 8) break;
            buffer.put(PAD0, 8);
            if (buffer.getLengthInBits() >= totalDataCount * 8) break;
            buffer.put(PAD1, 8);
        }
        return createBytes(buffer, rsBlocks);
    }

    function createBytes(buffer, rsBlocks) {
        var offset = 0;
        var maxDcCount = 0;
        var maxEcCount = 0;
        var dcdata = new Array(rsBlocks.length);
        var ecdata = new Array(rsBlocks.length);
        for (var r = 0; r < rsBlocks.length; r++) {
            var dcCount = rsBlocks[r].dataCount;
            var ecCount = rsBlocks[r].totalCount - dcCount;
            maxDcCount = Math.max(maxDcCount, dcCount);
            maxEcCount = Math.max(maxEcCount, ecCount);
            dcdata[r] = new Array(dcCount);
            for (var i = 0; i < dcdata[r].length; i++) {
                dcdata[r][i] = 0xff & buffer.buffer[i + offset];
            }
            offset += dcCount;
            var rsPoly = getErrorCorrectPolynomial(ecCount);
            var rawPoly = new Polynomial(dcdata[r], rsPoly.getLength() - 1);
            var modPoly = rawPoly.mod(rsPoly);
            ecdata[r] = new Array(rsPoly.getLength() - 1);
            for (var i = 0; i < ecdata[r].length; i++) {
                var modIndex = i + modPoly.getLength() - ecdata[r].length;
                ecdata[r][i] = (modIndex >= 0) ? modPoly.get(modIndex) : 0;
            }
        }
        var totalCodeCount = 0;
        for (var i = 0; i < rsBlocks.length; i++) totalCodeCount += rsBlocks[i].totalCount;
        var data = new Array(totalCodeCount);
        var index = 0;
        for (var i = 0; i < maxDcCount; i++) {
            for (var r = 0; r < rsBlocks.length; r++) {
                if (i < dcdata[r].length) data[index++] = dcdata[r][i];
            }
        }
        for (var i = 0; i < maxEcCount; i++) {
            for (var r = 0; r < rsBlocks.length; r++) {
                if (i < ecdata[r].length) data[index++] = ecdata[r][i];
            }
        }
        return data;
    }

    function getErrorCorrectPolynomial(length) {
        var a = new Polynomial([1], 0);
        for (var i = 0; i < length; i++) {
            a = a.multiply(new Polynomial([1, gexp(i)], 0));
        }
        return a;
    }

    function getLengthInBits(mode, type) {
        if (1 <= type && type < 10) {
            switch (mode) {
                case QR_MODE.MODE_NUMBER: return 10;
                case QR_MODE.MODE_ALPHA_NUM: return 9;
                case QR_MODE.MODE_8BIT_BYTE: return 8;
                case QR_MODE.MODE_KANJI: return 8;
                default: throw new Error('mode:' + mode);
            }
        } else if (type < 27) {
            switch (mode) {
                case QR_MODE.MODE_NUMBER: return 12;
                case QR_MODE.MODE_ALPHA_NUM: return 11;
                case QR_MODE.MODE_8BIT_BYTE: return 16;
                case QR_MODE.MODE_KANJI: return 10;
                default: throw new Error('mode:' + mode);
            }
        } else if (type < 41) {
            switch (mode) {
                case QR_MODE.MODE_NUMBER: return 14;
                case QR_MODE.MODE_ALPHA_NUM: return 13;
                case QR_MODE.MODE_8BIT_BYTE: return 16;
                case QR_MODE.MODE_KANJI: return 12;
                default: throw new Error('mode:' + mode);
            }
        } else {
            throw new Error('type:' + type);
        }
    }

    function BitBuffer() {
        this.buffer = [];
        this.length = 0;
    }

    BitBuffer.prototype.get = function(index) {
        var bufIndex = Math.floor(index / 8);
        return ((this.buffer[bufIndex] >>> (7 - index % 8)) & 1) === 1;
    };

    BitBuffer.prototype.put = function(num, length) {
        for (var i = 0; i < length; i++) {
            this.putBit(((num >>> (length - i - 1)) & 1) === 1);
        }
    };

    BitBuffer.prototype.getLengthInBits = function() { return this.length; };

    BitBuffer.prototype.putBit = function(bit) {
        var bufIndex = Math.floor(this.length / 8);
        if (this.buffer.length <= bufIndex) this.buffer.push(0);
        if (bit) this.buffer[bufIndex] |= (0x80 >>> (this.length % 8));
        this.length++;
    };

    function QR8bitByte(data) {
        this.mode = QR_MODE.MODE_8BIT_BYTE;
        this.data = data;
        this.parsedData = [];
        for (var i = 0, l = data.length; i < l; i++) {
            var byteArray = [];
            var code = data.charCodeAt(i);
            if (code > 0x10000) {
                byteArray[0] = 0xF0 | ((code & 0x1C0000) >>> 18);
                byteArray[1] = 0x80 | ((code & 0x3F000) >>> 12);
                byteArray[2] = 0x80 | ((code & 0xFC0) >>> 6);
                byteArray[3] = 0x80 | (code & 0x3F);
            } else if (code > 0x800) {
                byteArray[0] = 0xE0 | ((code & 0xF000) >>> 12);
                byteArray[1] = 0x80 | ((code & 0xFC0) >>> 6);
                byteArray[2] = 0x80 | (code & 0x3F);
            } else if (code > 0x80) {
                byteArray[0] = 0xC0 | ((code & 0x7C0) >>> 6);
                byteArray[1] = 0x80 | (code & 0x3F);
            } else {
                byteArray[0] = code;
            }
            this.parsedData = this.parsedData.concat(byteArray);
        }
        if (this.parsedData.length !== data.length) {
            this.parsedData.unshift(191);
            this.parsedData.unshift(187);
            this.parsedData.unshift(239);
        }
    }

    QR8bitByte.prototype.getLength = function() { return this.parsedData.length; };
    QR8bitByte.prototype.write = function(buffer) {
        for (var i = 0, l = this.parsedData.length; i < l; i++) {
            buffer.put(this.parsedData[i], 8);
        }
    };

    function QRCodeModel(typeNumber, errorCorrectLevel) {
        this.typeNumber = typeNumber;
        this.errorCorrectLevel = errorCorrectLevel;
        this.modules = null;
        this.moduleCount = 0;
        this.dataCache = null;
        this.dataList = [];
    }

    QRCodeModel.prototype.addData = function(data) {
        var newData = new QR8bitByte(data);
        this.dataList.push(newData);
        this.dataCache = null;
    };

    QRCodeModel.prototype.isDark = function(row, col) {
        if (row < 0 || this.moduleCount <= row || col < 0 || this.moduleCount <= col) {
            throw new Error(row + ',' + col);
        }
        return this.modules[row][col];
    };

    QRCodeModel.prototype.getModuleCount = function() { return this.moduleCount; };

    QRCodeModel.prototype.make = function() {
        this.makeImpl(false, this.getBestMaskPattern());
    };

    QRCodeModel.prototype.makeImpl = function(test, maskPattern) {
        this.moduleCount = this.typeNumber * 4 + 17;
        this.modules = new Array(this.moduleCount);
        for (var row = 0; row < this.moduleCount; row++) {
            this.modules[row] = new Array(this.moduleCount);
            for (var col = 0; col < this.moduleCount; col++) {
                this.modules[row][col] = null;
            }
        }
        this.setupPositionProbePattern(0, 0);
        this.setupPositionProbePattern(this.moduleCount - 7, 0);
        this.setupPositionProbePattern(0, this.moduleCount - 7);
        this.setupPositionAdjustPattern();
        this.setupTimingPattern();
        this.setupTypeInfo(test, maskPattern);
        if (this.typeNumber >= 7) this.setupTypeNumber(test);
        if (this.dataCache === null) this.dataCache = createData(this.typeNumber, this.errorCorrectLevel, this.dataList);
        this.mapData(this.dataCache, maskPattern);
    };

    QRCodeModel.prototype.setupPositionProbePattern = function(row, col) {
        for (var r = -1; r <= 7; r++) {
            if (row + r <= -1 || this.moduleCount <= row + r) continue;
            for (var c = -1; c <= 7; c++) {
                if (col + c <= -1 || this.moduleCount <= col + c) continue;
                if ((0 <= r && r <= 6 && (c === 0 || c === 6)) ||
                    (0 <= c && c <= 6 && (r === 0 || r === 6)) ||
                    (2 <= r && r <= 4 && 2 <= c && c <= 4)) {
                    this.modules[row + r][col + c] = true;
                } else {
                    this.modules[row + r][col + c] = false;
                }
            }
        }
    };

    QRCodeModel.prototype.getBestMaskPattern = function() {
        var minLostPoint = 0;
        var pattern = 0;
        for (var i = 0; i < 8; i++) {
            this.makeImpl(true, i);
            var lostPoint = QRUtil.getLostPoint(this);
            if (i === 0 || minLostPoint > lostPoint) {
                minLostPoint = lostPoint;
                pattern = i;
            }
        }
        return pattern;
    };

    QRCodeModel.prototype.setupTimingPattern = function() {
        for (var r = 8; r < this.moduleCount - 8; r++) {
            if (this.modules[r][6] !== null) continue;
            this.modules[r][6] = (r % 2 === 0);
        }
        for (var c = 8; c < this.moduleCount - 8; c++) {
            if (this.modules[6][c] !== null) continue;
            this.modules[6][c] = (c % 2 === 0);
        }
    };

    QRCodeModel.prototype.setupPositionAdjustPattern = function() {
        var pos = QRUtil.getPatternPosition(this.typeNumber);
        for (var i = 0; i < pos.length; i++) {
            for (var j = 0; j < pos.length; j++) {
                var row = pos[i];
                var col = pos[j];
                if (this.modules[row][col] !== null) continue;
                for (var r = -2; r <= 2; r++) {
                    for (var c = -2; c <= 2; c++) {
                        if (r === -2 || r === 2 || c === -2 || c === 2 || (r === 0 && c === 0)) {
                            this.modules[row + r][col + c] = true;
                        } else {
                            this.modules[row + r][col + c] = false;
                        }
                    }
                }
            }
        }
    };

    QRCodeModel.prototype.setupTypeInfo = function(test, maskPattern) {
        var data = (this.errorCorrectLevel << 3) | maskPattern;
        var bits = QRUtil.getBCHTypeInfo(data);
        for (var i = 0; i < 15; i++) {
            var mod = (!test && ((bits >> i) & 1) === 1);
            if (i < 6) {
                this.modules[i][8] = mod;
            } else if (i < 8) {
                this.modules[i + 1][8] = mod;
            } else {
                this.modules[this.moduleCount - 15 + i][8] = mod;
            }
        }
        for (var i = 0; i < 15; i++) {
            var mod = (!test && ((bits >> i) & 1) === 1);
            if (i < 8) {
                this.modules[8][this.moduleCount - i - 1] = mod;
            } else if (i < 9) {
                this.modules[8][15 - i - 1 + 1] = mod;
            } else {
                this.modules[8][15 - i - 1] = mod;
            }
        }
        this.modules[this.moduleCount - 8][8] = !test;
    };

    QRCodeModel.prototype.setupTypeNumber = function(test) {
        var bits = QRUtil.getBCHTypeNumber(this.typeNumber);
        for (var i = 0; i < 18; i++) {
            var mod = (!test && ((bits >> i) & 1) === 1);
            this.modules[Math.floor(i / 3)][i % 3 + this.moduleCount - 8 - 3] = mod;
        }
        for (var i = 0; i < 18; i++) {
            var mod = (!test && ((bits >> i) & 1) === 1);
            this.modules[i % 3 + this.moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
        }
    };

    QRCodeModel.prototype.mapData = function(data, maskPattern) {
        var inc = -1;
        var row = this.moduleCount - 1;
        var bitIndex = 7;
        var byteIndex = 0;
        var maskFunc = QRUtil.getMaskFunction(maskPattern);
        for (var col = this.moduleCount - 1; col > 0; col -= 2) {
            if (col === 6) col--;
            while (true) {
                for (var c = 0; c < 2; c++) {
                    if (this.modules[row][col - c] === null) {
                        var dark = false;
                        if (byteIndex < data.length) {
                            dark = ((data[byteIndex] >>> bitIndex) & 1) === 1;
                        }
                        var mask = maskFunc(row, col - c);
                        if (mask) dark = !dark;
                        this.modules[row][col - c] = dark;
                        bitIndex--;
                        if (bitIndex === -1) {
                            byteIndex++;
                            bitIndex = 7;
                        }
                    }
                }
                row += inc;
                if (row < 0 || this.moduleCount <= row) {
                    row -= inc;
                    inc = -inc;
                    break;
                }
            }
        }
    };

    var QRUtil = {
        PATTERN_POSITION_TABLE: [
            [], [6,18], [6,22], [6,26], [6,30], [6,34], [6,22,38], [6,24,42], [6,26,46],
            [6,28,50], [6,30,54], [6,32,58], [6,34,62], [6,26,46,66], [6,26,48,70],
            [6,26,50,74], [6,30,54,78], [6,30,56,82], [6,30,58,86], [6,34,62,90],
            [6,28,50,72,94], [6,26,50,74,98], [6,30,54,78,102], [6,28,54,80,106],
            [6,32,58,84,110], [6,30,58,86,114], [6,34,62,90,118], [6,26,50,74,98,122],
            [6,30,54,78,102,126], [6,26,52,78,104,130], [6,30,56,82,108,134],
            [6,34,60,86,112,138], [6,30,58,86,114,142], [6,34,62,90,118,146],
            [6,30,54,78,102,126,150], [6,24,50,76,102,128,154], [6,28,54,80,106,132,158],
            [6,32,58,84,110,136,162], [6,26,54,82,110,138,166], [6,30,58,86,114,142,170]
        ],
        G15: (1 << 10) | (1 << 8) | (1 << 5) | (1 << 4) | (1 << 2) | (1 << 1) | (1 << 0),
        G18: (1 << 12) | (1 << 11) | (1 << 10) | (1 << 9) | (1 << 8) | (1 << 5) | (1 << 2) | (1 << 0),
        G15_MASK: (1 << 14) | (1 << 12) | (1 << 10) | (1 << 4) | (1 << 1),

        getBCHTypeInfo: function(data) {
            var d = data << 10;
            while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15) >= 0) {
                d ^= (QRUtil.G15 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15)));
            }
            return ((data << 10) | d) ^ QRUtil.G15_MASK;
        },

        getBCHTypeNumber: function(data) {
            var d = data << 12;
            while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18) >= 0) {
                d ^= (QRUtil.G18 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18)));
            }
            return (data << 12) | d;
        },

        getBCHDigit: function(data) {
            var digit = 0;
            while (data !== 0) { digit++; data >>>= 1; }
            return digit;
        },

        getPatternPosition: function(typeNumber) {
            return QRUtil.PATTERN_POSITION_TABLE[typeNumber - 1];
        },

        getMaskFunction: function(maskPattern) {
            switch (maskPattern) {
                case 0: return function(i, j) { return (i + j) % 2 === 0; };
                case 1: return function(i, j) { return i % 2 === 0; };
                case 2: return function(i, j) { return j % 3 === 0; };
                case 3: return function(i, j) { return (i + j) % 3 === 0; };
                case 4: return function(i, j) { return (Math.floor(i / 2) + Math.floor(j / 3)) % 2 === 0; };
                case 5: return function(i, j) { return (i * j) % 2 + (i * j) % 3 === 0; };
                case 6: return function(i, j) { return ((i * j) % 2 + (i * j) % 3) % 2 === 0; };
                case 7: return function(i, j) { return ((i * j) % 3 + (i + j) % 2) % 2 === 0; };
                default: throw new Error('bad maskPattern:' + maskPattern);
            }
        },

        getLostPoint: function(qrCode) {
            var moduleCount = qrCode.getModuleCount();
            var lostPoint = 0;
            for (var row = 0; row < moduleCount; row++) {
                for (var col = 0; col < moduleCount; col++) {
                    var sameCount = 0;
                    var dark = qrCode.isDark(row, col);
                    for (var r = -1; r <= 1; r++) {
                        if (row + r < 0 || moduleCount <= row + r) continue;
                        for (var c = -1; c <= 1; c++) {
                            if (col + c < 0 || moduleCount <= col + c) continue;
                            if (r === 0 && c === 0) continue;
                            if (dark === qrCode.isDark(row + r, col + c)) sameCount++;
                        }
                    }
                    if (sameCount > 5) lostPoint += (3 + sameCount - 5);
                }
            }
            for (var row = 0; row < moduleCount - 1; row++) {
                for (var col = 0; col < moduleCount - 1; col++) {
                    var count = 0;
                    if (qrCode.isDark(row, col)) count++;
                    if (qrCode.isDark(row + 1, col)) count++;
                    if (qrCode.isDark(row, col + 1)) count++;
                    if (qrCode.isDark(row + 1, col + 1)) count++;
                    if (count === 0 || count === 4) lostPoint += 3;
                }
            }
            for (var row = 0; row < moduleCount; row++) {
                for (var col = 0; col < moduleCount - 6; col++) {
                    if (qrCode.isDark(row, col) && !qrCode.isDark(row, col + 1) &&
                        qrCode.isDark(row, col + 2) && qrCode.isDark(row, col + 3) &&
                        qrCode.isDark(row, col + 4) && !qrCode.isDark(row, col + 5) &&
                        qrCode.isDark(row, col + 6)) {
                        lostPoint += 40;
                    }
                }
            }
            for (var col = 0; col < moduleCount; col++) {
                for (var row = 0; row < moduleCount - 6; row++) {
                    if (qrCode.isDark(row, col) && !qrCode.isDark(row + 1, col) &&
                        qrCode.isDark(row + 2, col) && qrCode.isDark(row + 3, col) &&
                        qrCode.isDark(row + 4, col) && !qrCode.isDark(row + 5, col) &&
                        qrCode.isDark(row + 6, col)) {
                        lostPoint += 40;
                    }
                }
            }
            var darkCount = 0;
            for (var col = 0; col < moduleCount; col++) {
                for (var row = 0; row < moduleCount; row++) {
                    if (qrCode.isDark(row, col)) darkCount++;
                }
            }
            var ratio = Math.abs(100 * darkCount / moduleCount / moduleCount - 50) / 5;
            lostPoint += ratio * 10;
            return lostPoint;
        }
    };

    var QR_CODE_LIMIT_LENGTH = [
        [17,14,11,7],[32,26,20,14],[53,42,32,24],[78,62,46,34],[106,84,60,44],
        [134,106,74,58],[154,122,86,64],[192,152,108,84],[230,180,130,98],
        [271,213,151,119],[321,251,177,137],[367,287,203,155],[425,331,241,177],
        [458,362,258,194],[520,412,292,220],[586,450,322,250],[644,504,364,280],
        [718,560,394,310],[792,624,442,338],[858,666,482,382],[929,711,509,403],
        [1003,779,565,439],[1091,857,611,461],[1171,911,661,511],[1273,997,715,535],
        [1367,1059,751,593],[1465,1125,805,625],[1528,1190,868,658],[1628,1264,908,698],
        [1732,1370,982,742],[1840,1452,1030,790],[1952,1538,1112,842],[2068,1628,1168,898],
        [2188,1722,1228,958],[2303,1809,1283,983],[2431,1911,1351,1051],[2563,1989,1423,1093],
        [2699,2099,1499,1139],[2809,2213,1579,1219],[2953,2331,1663,1273]
    ];

    function getTypeNumber(dataLength, errorCorrectLevel) {
        for (var typeNumber = 1; typeNumber <= 40; typeNumber++) {
            var limit = QR_CODE_LIMIT_LENGTH[typeNumber - 1][EC_TABLE_INDEX[errorCorrectLevel]];
            if (dataLength <= limit) return typeNumber;
        }
        throw new Error('Data too long');
    }

    function getUTF8ByteLength(text) {
        var len = 0;
        var hasNonAscii = false;
        for (var i = 0; i < text.length; i++) {
            var code = text.charCodeAt(i);
            if (code > 0x10000) { len += 4; hasNonAscii = true; }
            else if (code > 0x800) { len += 3; hasNonAscii = true; }
            else if (code > 0x80) { len += 2; hasNonAscii = true; }
            else len += 1;
        }
        if (hasNonAscii) len += 3;
        return len;
    }

    function makeQRCode(text, errorCorrectLevel) {
        var byteLen = getUTF8ByteLength(text);
        var typeNumber = getTypeNumber(byteLen, errorCorrectLevel);
        var qr = new QRCodeModel(typeNumber, errorCorrectLevel);
        qr.addData(text);
        qr.make();
        return qr;
    }

    function drawQRToCanvas(qr, canvas, options) {
        var moduleCount = qr.getModuleCount();
        var size = options.width || 256;
        var margin = options.margin || 4;
        var fgColor = (options.color && options.color.dark) || '#000000';
        var bgColor = (options.color && options.color.light) || '#ffffff';
        var cellSize = Math.floor(size / (moduleCount + 2 * margin));
        var offset = Math.floor((size - cellSize * moduleCount) / 2);

        canvas.width = size;
        canvas.height = size;
        var ctx = canvas.getContext('2d');

        if (bgColor === 'rgba(0,0,0,0)' || bgColor === 'transparent') {
            ctx.clearRect(0, 0, size, size);
        } else {
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);
        }

        ctx.fillStyle = fgColor;
        for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount; col++) {
                if (qr.isDark(row, col)) {
                    ctx.fillRect(offset + col * cellSize, offset + row * cellSize, cellSize, cellSize);
                }
            }
        }
    }

    var EC_LEVEL_MAP = { 'L': 1, 'M': 0, 'Q': 3, 'H': 2 };

    document.addEventListener('DOMContentLoaded', function() {
        var textInput = document.getElementById('qrcode-text');
        var sizeInput = document.getElementById('qrcode-size');
        var fgcolorInput = document.getElementById('qrcode-fgcolor');
        var bgcolorInput = document.getElementById('qrcode-bgcolor');
        var transparentCheck = document.getElementById('qrcode-transparent');
        var generateBtn = document.getElementById('qrcode-generate');
        var resultDiv = document.getElementById('qrcode-result');
        var actionsDiv = document.getElementById('qrcode-actions');
        var downloadLink = document.getElementById('qrcode-download');
        var copyBtn = document.getElementById('qrcode-copy');

        transparentCheck.addEventListener('change', function() {
            bgcolorInput.disabled = this.checked;
            bgcolorInput.style.opacity = this.checked ? '0.4' : '1';
        });

        function generateQR() {
            var text = textInput.value.trim();
            if (!text) {
                alert('请输入要编码的文本内容');
                textInput.focus();
                return;
            }

            var size = parseInt(sizeInput.value) || 400;
            var fgColor = fgcolorInput.value;
            var bgColor = transparentCheck.checked ? 'rgba(0,0,0,0)' : bgcolorInput.value;

            resultDiv.innerHTML = '';

            try {
                var qr = makeQRCode(text, EC_LEVEL_MAP['H']);
                var canvas = document.createElement('canvas');
                drawQRToCanvas(qr, canvas, {
                    width: size,
                    margin: 4,
                    color: { dark: fgColor, light: bgColor }
                });
                var imgData = canvas.toDataURL('image/png');
                var img = document.createElement('img');
                img.src = imgData;
                img.alt = 'QR Code';
                resultDiv.appendChild(img);
                actionsDiv.style.display = 'flex';
                downloadLink.href = imgData;
            } catch (e) {
                console.error('二维码生成失败:', e);
                resultDiv.innerHTML = '<div class="preview-placeholder"><p style="color:#e74c3c">生成失败：' + e.message + '</p></div>';
                actionsDiv.style.display = 'none';
            }
        }

        generateBtn.addEventListener('click', generateQR);

        textInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQR();
            }
        });

        copyBtn.addEventListener('click', function() {
            var img = resultDiv.querySelector('img');
            if (!img) return;

            fetch(img.src)
                .then(function(res) { return res.blob(); })
                .then(function(blob) {
                    if (navigator.clipboard && window.ClipboardItem) {
                        navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]).then(function() {
                            var orig = copyBtn.textContent;
                            copyBtn.textContent = '已复制 ✓';
                            setTimeout(function() { copyBtn.textContent = orig; }, 2000);
                        }).catch(function() {
                            fallbackCopy(img);
                        });
                    } else {
                        fallbackCopy(img);
                    }
                });
        });

        function fallbackCopy(img) {
            navigator.clipboard.writeText(img.src).then(function() {
                alert('图片数据已复制到剪贴板');
            }).catch(function() {
                alert('复制失败，请使用下载功能');
            });
        }

        setTimeout(generateQR, 300);
    });
})();
