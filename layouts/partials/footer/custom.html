<style>
  @font-face {
    font-family: 'YuWoErYanNi';
    src: url('{{ (resources.Get "font/YuWoErYanNiZuiKeAi-2.ttf").Permalink }}') format('truetype');
    font-display: swap;
  }

  :root {
    /* 兼容网上的教程，并补充 Stack 主题所需的特定变量 */
    --base-font-family: 'YuWoErYanNi', sans-serif;
    --sys-font-family: 'YuWoErYanNi', sans-serif;
    --article-font-family: 'YuWoErYanNi', sans-serif;
    
    /* 如果您连代码块也想用这个字体，可以保留下面这行，否则建议注释掉 */
    --code-font-family: 'YuWoErYanNi', monospace;
  }
</style>

<!-- 落葉效果指令碼 -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
      // 提供不同顏色的 SVG 樹葉圖標取代原本的表情符號
      const svgLeaves = [
          `<svg viewBox="0 0 24 24" fill="#a4c9a6" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`,
          `<svg viewBox="0 0 24 24" fill="#d9ad61" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`,
          `<svg viewBox="0 0 24 24" fill="#e88975" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`
      ];
      
      function createLeaf() {
          const leaf = document.createElement("div");
          leaf.className = "leaf";
          leaf.innerHTML = svgLeaves[Math.floor(Math.random() * svgLeaves.length)];
          
          // 隨機初始水平位置
          leaf.style.left = Math.random() * 100 + "vw";
          
          // 隨機動畫時間 (5s - 12s)
          const duration = Math.random() * 7 + 5;
          leaf.style.animationDuration = duration + "s";
          
          // 隨機大小
          const size = Math.random() * 10 + 15;
          leaf.style.width = size + "px";
          leaf.style.height = size + "px";
          
          document.body.appendChild(leaf);
          
          // 自動清理
          setTimeout(() => {
              leaf.remove();
          }, duration * 1000);
      }
      
      // 每 800ms 產生一片樹葉
      setInterval(createLeaf, 800);
      
      // 初始稍微產生一些
      for(let i=0; i<5; i++) {
          setTimeout(createLeaf, i * 200);
      }
  });

  // ==========================================
  // 壁纸持久化系统：每天只更换一次壁纸
  // ==========================================
  document.addEventListener("DOMContentLoaded", function() {
      const bingImg = document.querySelector('.bing-img');
      if (bingImg) {
          // 获取今天的日期戳作为缓存键的一部分
          const today = new Date().toDateString();
          let cachedVersion = localStorage.getItem('bing_bg_date');
          let cachedBgUrl = localStorage.getItem('bing_bg_url');
          
          if (cachedVersion === today && cachedBgUrl) {
              // 如果今天已经获取过壁纸，全站统一使用这个地址
              bingImg.src = cachedBgUrl;
          } else {
              // 为了避免跨域限制，这里直接让浏览器取当天的必应壁纸 (index=0为今天)
              // 也可以使用 index=随机数(0~7) 来在此处实现每日随机
              const randomIdx = Math.floor(Math.random() * 8); 
              const newUrl = `https://bing.biturl.top/?resolution=1920&format=image&index=${randomIdx}&mkt=zh-CN`;
              
              localStorage.setItem('bing_bg_date', today);
              localStorage.setItem('bing_bg_url', newUrl);
              bingImg.src = newUrl;
          }
      }
  });

  // ==========================================
  // 不蒜子统计缓存系统：设定 1 小时内同访客不再增加访问量
  // ==========================================
  document.addEventListener("DOMContentLoaded", function() {
      const CACHE_TIME = 60 * 60 * 1000; // 缓存时间（1小时）
      const now = Date.now();
      let bszCache = JSON.parse(localStorage.getItem('bsz_cache') || '{}');
      
      if (!bszCache.lastFetch || (now - bszCache.lastFetch > CACHE_TIME)) {
          // 超过缓存时间，正常加载不蒜子脚本
          let script = document.createElement('script');
          script.src = "//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js";
          script.async = true;
          document.body.appendChild(script);

          // 监听数据回传并保存到缓存
          const observer = new MutationObserver(() => {
              const pvEl = document.getElementById('busuanzi_value_site_pv');
              const uvEl = document.getElementById('busuanzi_value_site_uv');
              let updated = false;
              if (pvEl && pvEl.innerText && pvEl.innerText !== '') {
                  bszCache.sitePv = pvEl.innerText;
                  updated = true;
              }
              if (uvEl && uvEl.innerText && uvEl.innerText !== '') {
                  bszCache.siteUv = uvEl.innerText;
                  updated = true;
              }
              if (updated) {
                  bszCache.lastFetch = Date.now();
                  localStorage.setItem('bsz_cache', JSON.stringify(bszCache));
              }
          });
          observer.observe(document.body, { childList: true, subtree: true });
      } else {
          // 在缓存时间内，不请求接口，直接填入缓存的数字
          const pvEl = document.getElementById('busuanzi_value_site_pv');
          const uvEl = document.getElementById('busuanzi_value_site_uv');
          const pvContainer = document.getElementById('busuanzi_container_site_pv');
          const uvContainer = document.getElementById('busuanzi_container_site_uv');

          if (pvEl && bszCache.sitePv) {
              pvEl.innerText = bszCache.sitePv;
              if(pvContainer) pvContainer.style.display = 'inline';
          }
          if (uvEl && bszCache.siteUv) {
              uvEl.innerText = bszCache.siteUv;
              if(uvContainer) uvContainer.style.display = 'inline';
          }
      }
  });
  </script>

  <!-- 总访客数统计展示区 -->
  <div class="busuanzi-footer">
    <span id="busuanzi_container_site_uv" style="display:none;">本站总访客数 <span id="busuanzi_value_site_uv"></span> 人</span>
  </div>

  <!-- 必应随机全屏壁纸底层 -->
  <div class="bing-wrapper">
    <!-- src 交给了上面的 JS 管理，防止跳转页面时出现闪烁和刷新 -->
    <img alt="Bing壁纸" class="bing-img" />
    <div class="bing-mask"></div>
  </div>
