<!-- 落葉效果指令碼 -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
      // 提供不同顏色的 SVG 樹葉圖標取代原本的表情符號
      const svgLeaves = [
          `<svg viewBox="0 0 24 24" fill="#a4c9a6" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`,
          `<svg viewBox="0 0 24 24" fill="#d9ad61" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`,
          `<svg viewBox="0 0 24 24" fill="#e88975" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`
      ];
      
      function createLeaf() {
          const leaf = document.createElement("div");
          leaf.className = "leaf";
          leaf.innerHTML = svgLeaves[Math.floor(Math.random() * svgLeaves.length)];
          
          // 隨機初始水平位置
          leaf.style.left = Math.random() * 100 + "vw";
          
          // 隨機動畫時間 (5s - 12s)
          const duration = Math.random() * 7 + 5;
          leaf.style.animationDuration = duration + "s";
          
          // 隨機大小
          const size = Math.random() * 10 + 15;
          leaf.style.width = size + "px";
          leaf.style.height = size + "px";
          
          document.body.appendChild(leaf);
          
          // 自動清理
          setTimeout(() => {
              leaf.remove();
          }, duration * 1000);
      }
      
      // 每 800ms 產生一片樹葉
      setInterval(createLeaf, 800);
      
      // 初始稍微產生一些
      for(let i=0; i<5; i++) {
          setTimeout(createLeaf, i * 200);
      }      
      // ==========================================
      // 鼠标点击生成贯穿左右的折线形状毛玻璃装饰
      // ==========================================
      document.addEventListener("mousedown", function(e) {
          const zBox = document.createElement("div");
          zBox.className = "z-click-effect";
          
          // 随机生成垂直位置、厚度和轻微倾斜
          const rotate = Math.random() * 20 - 10; // -10度 到 10度 的微小倾角
          const topPos = Math.random() * 80 + 10; // 生成在高度 10% 到 90% 范围内
          const height = Math.random() * 60 + 80; // 厚度为 80px - 140px

          // 使用 fixed 相对屏幕定位，并让其宽度稍微超出屏幕两侧确保贯穿全屏
          zBox.style.position = "fixed";
          zBox.style.left = "-10vw";
          zBox.style.width = "120vw";
          zBox.style.top = topPos + "vh";
          zBox.style.height = height + "px";
          zBox.style.transform = `rotate(${rotate}deg)`;
          
          // 折线形的轮廓与严丝合缝的外部描边
          zBox.innerHTML = `
              <div class="z-glass-bg"></div>
              <svg viewBox="0 0 100 100" class="z-glass-border" preserveAspectRatio="none">
                  <path d="M 0 40 L 25 60 L 50 40 L 75 60 L 100 40 L 100 60 L 75 80 L 50 60 L 25 80 L 0 60 Z" />
              </svg>
          `;
          
          document.body.appendChild(zBox);
          
          // 为了避免无限无限制堆积导致浏览器卡顿，设置60秒后自动从DOM清理，但视觉上完全没有消失动画
          setTimeout(() => {
              if (zBox.parentNode) zBox.remove();
          }, 60000);
      });  });
  </script>
