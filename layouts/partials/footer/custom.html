<style>
  @font-face {
    font-family: 'YuWoErYanNi';
    src: url('{{ (resources.Get "font/YuWoErYanNiZuiKeAi-2.ttf").Permalink }}') format('truetype');
    font-display: swap;
  }

  :root {
    /* 兼容网上的教程，并补充 Stack 主题所需的特定变量 */
    --base-font-family: 'YuWoErYanNi', sans-serif;
    --sys-font-family: 'YuWoErYanNi', sans-serif;
    --article-font-family: 'YuWoErYanNi', sans-serif;
    
    /* 如果您连代码块也想用这个字体，可以保留下面这行，否则建议注释掉 */
    --code-font-family: 'YuWoErYanNi', monospace;
  }
</style>

<!-- 落葉效果指令碼 -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
      // 提供不同顏色的 SVG 樹葉圖標取代原本的表情符號
      const svgLeaves = [
          `<svg viewBox="0 0 24 24" fill="#a4c9a6" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`,
          `<svg viewBox="0 0 24 24" fill="#d9ad61" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`,
          `<svg viewBox="0 0 24 24" fill="#e88975" width="100%" height="100%"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7,11.5 7,11.5C7,11.5 12,8 17,8Z"/></svg>`
      ];
      
      function createLeaf() {
          const leaf = document.createElement("div");
          leaf.className = "leaf";
          leaf.innerHTML = svgLeaves[Math.floor(Math.random() * svgLeaves.length)];
          
          // 隨機初始水平位置
          leaf.style.left = Math.random() * 100 + "vw";
          
          // 隨機動畫時間 (5s - 12s)
          const duration = Math.random() * 7 + 5;
          leaf.style.animationDuration = duration + "s";
          
          // 隨機大小
          const size = Math.random() * 10 + 15;
          leaf.style.width = size + "px";
          leaf.style.height = size + "px";
          
          document.body.appendChild(leaf);
          
          // 自動清理
          setTimeout(() => {
              leaf.remove();
          }, duration * 1000);
      }
      
      // 每 800ms 產生一片樹葉
      setInterval(createLeaf, 800);
      
      // 初始稍微產生一些
      for(let i=0; i<5; i++) {
          setTimeout(createLeaf, i * 200);
      }
  });

  // ==========================================
  // 壁纸持久化系统：每次访问博客访问周期内不更换图片
  // ==========================================
  document.addEventListener("DOMContentLoaded", function() {
      const bingImg = document.querySelector('.bing-img');
      if (bingImg) {
          // 尝试从本地会话存储中获取已经缓存好的壁纸链接
          let cachedBgUrl = sessionStorage.getItem('bing_bg_url');
          if (cachedBgUrl) {
              // 如果在这个会话(窗口不关)中已经有了壁纸，直接使用它
              bingImg.src = cachedBgUrl;
          } else {
              // 如果没有缓存，则向 API 请求一次新的随机壁纸并截获最终真实图片地址
              fetch("https://bing.img.run/rand.php")
                  .then(response => {
                      const finalUrl = response.url; // 获取重定向后的直接稳定链接
                      sessionStorage.setItem('bing_bg_url', finalUrl); // 存入该次访问周期的存储库
                      bingImg.src = finalUrl;
                  })
                  .catch(e => {
                      // 如果跨网络抓取失败，仍回退到原本的随机 API
                      bingImg.src = "https://bing.img.run/rand.php";
                  });
          }
      }
  });
  </script>

  <!-- 不蒜子总访问量统计 -->
  <div class="busuanzi-footer">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <span id="busuanzi_container_site_pv">本站总访问量<span id="busuanzi_value_site_pv"></span>次</span>
  </div>

  <!-- 必应随机全屏壁纸底层 -->
  <div class="bing-wrapper">
    <!-- src 交给了上面的 JS 管理，防止跳转页面时出现闪烁和刷新 -->
    <img alt="Bing壁纸" class="bing-img" />
    <div class="bing-mask"></div>
  </div>
