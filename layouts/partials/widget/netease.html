{{ if site.Data.song }}
{{ $song := site.Data.song }}
<section class="widget netease-hot">
    <div class="widget-icon">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-music" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
            <circle cx="6" cy="17" r="3"></circle>
            <circle cx="16" cy="17" r="3"></circle>
            <polyline points="9 17 9 4 19 4 19 17"></polyline>
            <line x1="9" y1="8" x2="19" y2="8"></line>
        </svg>
    </div>
    <h2 class="widget-title section-title">�����Ƽ�</h2>
    <div class="widget--netease">
        <a href="{{ $song.link | default '#' }}" target="_blank" class="netease-link">
            <div class="netease-content">
                <img class="netease-pic" src="{{ $song.cover }}" alt="封面" />
                <div class="netease-info">
                    <div class="netease-title">{{ $song.title }}{{ if $song.album }} - {{ $song.album }}{{ end }}</div>
                    <div class="netease-author">{{ $song.author }}</div>
                </div>
            </div>
        </a>
        {{ if $song.comment }}
        <div class="netease-comment">
            <p>{{ $song.comment }}</p>
        </div>
        {{ end }}
    </div>
</section>

<style>
/* ����������һ�µ��ڲ����� */
.widget--netease {
    padding: 5px 0;
}

.netease-link {
    text-decoration: none;
    color: inherit;
    display: block;
    border-radius: 8px;
    transition: background-color 0.3s;
    padding: 8px;
    margin-bottom: 8px;
}

.netease-link:hover {
    background-color: var(--card-background-selected, rgba(0, 0, 0, 0.03));
}

[data-scheme="dark"] .netease-link:hover {
    background-color: rgba(255, 255, 255, 0.05);
}

.netease-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.netease-pic {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.netease-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    flex: 1;
}

.netease-title {
    font-size: 1.1rem;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
    color: var(--body-text-color);
}

.netease-author {
    font-size: 0.95rem;
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--body-text-color);
}

.netease-comment {
    padding: 10px 12px;
    background-color: rgba(0, 0, 0, 0.02);
    border-radius: 8px;
    font-size: 0.9rem;
    color: var(--body-text-color);
    opacity: 0.9;
    border-left: 4px solid #f85656;
    line-height: 1.5;
    margin: 0 4px;
}

[data-scheme="dark"] .netease-comment {
    background-color: rgba(255, 255, 255, 0.03);
    border-left-color: #d33a31;
}

.netease-comment p {
    margin: 0;
}
</style>
{{ end }}
