<section class="widget netease-hot">
    <div class="widget-icon">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-music" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
            <circle cx="6" cy="17" r="3"></circle>
            <circle cx="16" cy="17" r="3"></circle>
            <polyline points="9 17 9 4 19 4 19 17"></polyline>
            <line x1="9" y1="8" x2="19" y2="8"></line>
        </svg>
    </div>
    <h2 class="widget-title section-title">网易云音乐</h2>
    <div class="widget--netease">
        <a id="netease-link" href="#" target="_blank" class="netease-link" style="display: none;">
            <div class="netease-content">
                <img id="netease-pic" class="netease-pic" src="" alt="封面" />
                <div class="netease-info">
                    <div id="netease-title" class="netease-title">加载中...</div>
                    <div id="netease-author" class="netease-author">请稍候</div>
                </div>
            </div>
        </a>
        <div id="netease-error" style="text-align: center; color: var(--body-text-color); font-size: 0.9rem; padding: 10px 0;">
            加载中...
        </div>
    </div>
</section>

<style>
/* 保持与主题一致的内部布局，不再强制附加多余白底，以继承外层widget样式 */
.widget--netease {
    padding: 10px 0;
}

.netease-link {
    text-decoration: none;
    color: inherit;
    display: block;
    border-radius: 8px;
    transition: background-color 0.3s;
}

.netease-link:hover {
    background-color: var(--card-background-selected, rgba(0, 0, 0, 0.05));
}

[data-scheme="dark"] .netease-link:hover {
    background-color: rgba(255, 255, 255, 0.05);
}

.netease-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.netease-pic {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.netease-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    flex: 1;
}

.netease-title {
    font-size: 1rem;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
    color: var(--body-text-color);
}

.netease-author {
    font-size: 0.85rem;
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--body-text-color);
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 替换为你在 uapis.cn 获取的对应 API Key （如果你更换了请在这里更新）
    const apiKey = 'uapi-mu3v20bqYcYNTKpMgs5uiLuDr9Px6k0cJW2W8C7_';

    fetch('https://uapis.cn/api/v1/misc/hotboard?type=netease-music', {
        method: 'GET',
        headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: 请检查 API Key 权限或存在跨域问题`);
        }
        return response.json();
    })
    .then(res => {
        let list = [];
        
        // 兼容 uapis 常见的返回结构
        if (res.data && res.data.list) {
            list = res.data.list;
        } else if (res.data && Array.isArray(res.data)) {
            list = res.data;
        } else if (res.list && Array.isArray(res.list)) {
            list = res.list;
        } else if (Array.isArray(res)) {
            list = res;
        }

        if (list && list.length > 0) {
            const song = list[0]; // 只需要第一首歌
            
            // 针对接口可能的字段做全面兼容
            const name = song.name || song.title || "未知歌名";
            let author = song.author || song.artist || "未知歌手";
            if (song.ar && song.ar.length > 0) author = song.ar.map(a => a.name).join('/');
            
            const pic = song.pic || song.cover || song.picUrl || (song.al && song.al.picUrl) || "";
            const url = song.url || song.link || `https://music.163.com/#/song?id=${song.id || ''}`;
            
            document.getElementById('netease-title').textContent = name;
            document.getElementById('netease-author').textContent = author;
            if (pic) {
                document.getElementById('netease-pic').src = pic;
            }
            document.getElementById('netease-link').href = url;
            
            document.getElementById('netease-link').style.display = 'block';
            document.getElementById('netease-error').style.display = 'none';
        } else {
            throw new Error("接口未返回内容或无法遍历数据结构");
        }
    })
    .catch(error => {
        console.error('API Error:', error);
        const errEl = document.getElementById('netease-error');
        errEl.textContent = '无法获取榜单数据: ' + error.message;
        errEl.style.display = 'block';
        document.getElementById('netease-link').style.display = 'none';
    });
});
</script>
