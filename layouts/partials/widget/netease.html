{{ if site.Data.song }}
{{ $song := site.Data.song }}
<section class="widget netease-hot archives">
    <div class="widget-icon">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-music" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
            <circle cx="6" cy="17" r="3"></circle>
            <circle cx="16" cy="17" r="3"></circle>
            <polyline points="9 17 9 4 19 4 19 17"></polyline>
            <line x1="9" y1="8" x2="19" y2="8"></line>
        </svg>
    </div>
    <h2 class="widget-title section-title">歌曲推荐</h2>
    <div class="widget--netease">
        <a href="{{ $song.link | default '#' }}" target="_blank" class="netease-link">
            <div class="netease-content">
                <img class="netease-pic" src="{{ $song.cover }}" alt="封面" />
                <div class="netease-info">
                    <div class="netease-title-text">{{ $song.title }}{{ if $song.album }} - {{ $song.album }}{{ end }}</div>
                    <div class="netease-author-text">{{ $song.author }}</div>
                </div>
            </div>
        </a>
        {{ if $song.comment }}
        <div class="netease-comment">
            <p>{{ $song.comment }}</p>
        </div>
        {{ end }}
    </div>
</section>

<style>
/* 匹配你自定义的归档/标签云毛玻璃样式。
这里通过对 a 标签及其容器应用你的统一 rgba(124, 171, 134) 色系毛玻璃。
通过给外层 section 添加 archives class 从而去除默认白底。*/

.widget--netease {
    padding: 2px 0;
}

.netease-link, .netease-comment {
    /* 与你的 custom.scss 中的 .archives-year a 统一参数 */
    display: block;
    margin: 4px;
    border-radius: 8px;
    text-decoration: none;
    
    background: rgba(124, 171, 134, 0.15) !important;
    background-color: rgba(124, 171, 134, 0.15) !important;
    background-image: none !important;
    box-shadow: none !important;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    
    border: 2px solid transparent !important;
    transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
}

/* Hover 特效对齐你的归档 */
.netease-link:hover {
    border-color: rgba(124, 171, 134, 0.8) !important;
    background-color: rgba(124, 171, 134, 0.25) !important;
}

.netease-link {
    padding: 8px 12px;
}

.netease-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.netease-pic {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
}

.netease-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    flex: 1;
}

.netease-title-text {
    font-size: 1.1rem;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
    color: var(--body-text-color);
}

.netease-author-text {
    font-size: 0.95rem;
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--body-text-color);
}

.netease-comment {
    padding: 10px 12px;
    font-size: 0.9rem;
    color: var(--body-text-color);
    opacity: 0.9;
    /* 取消单独的左边框，回归整体卡片风格 */
    line-height: 1.5;
}

.netease-comment p {
    margin: 0;
}
</style>
{{ end }}
