mainSections = ["post"]
rssFullContent = true
favicon = "/favicon.ico"

[footer]
    since = 2026
    customText = "兄弟你不要跟我拉扯 我告诉你 我身体里有一个孙笑川 一个户晨风还有一个体育生和做题区 哦对了 还有个吉他张"

[dateFormat]
    published = "Jan 02, 2006"
    lastUpdated = "Jan 02, 2006 15:04 MST"

[sidebar]
    emoji = "😝"
    subtitle = "欢迎来到我的博客喵"
    avatar = "img/avatar.ico"

[article]
    math = false
    toc = true
    readingTime = false

    [article.license]
        enabled = false
        default = "Licensed under CC BY-NC-SA 4.0"

[comments]
    enabled = false
    provider = "disqus"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } }
    ]
    page = [
        { type = "toc" }
    ]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[defaultImage.opengraph]
    enabled = false
    local = false
    src = ""

[colorScheme]
    toggle = true
    default = "auto"

[imageProcessing.cover]
    enabled = true

[imageProcessing.content]
    enabled = true
